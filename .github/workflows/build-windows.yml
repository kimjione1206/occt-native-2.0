# ============================================================================
# OCCT Native Stress Test - Windows Portable Build Pipeline
# ============================================================================
# Triggers:
#   - On version tag push (v*) -> builds and creates GitHub Release
#   - On manual workflow_dispatch -> builds artifact only
# ============================================================================

name: Build Windows Portable

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.2'

jobs:
  build:
    name: Windows x64 Portable Build
    runs-on: windows-latest

    steps:
      # ── Cleanup old artifacts (keep max 5) ──────────────────────────
      - name: Cleanup Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_KEEP = 4; // keep 4, new upload makes 5
            const artifactName = 'OCCT-StressTest-win64-portable';
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: artifactName,
              per_page: 100,
            });
            const artifacts = data.artifacts
              .filter(a => !a.expired)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            if (artifacts.length >= MAX_KEEP) {
              const toDelete = artifacts.slice(MAX_KEEP);
              for (const art of toDelete) {
                console.log(`Deleting artifact: ${art.name} #${art.id} (${art.created_at})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: art.id,
                });
              }
              console.log(`Deleted ${toDelete.length} old artifact(s).`);
            } else {
              console.log(`Only ${artifacts.length} artifact(s) found. No cleanup needed.`);
            }

      # ── Checkout source ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Qt6 via aqtinstall ───────────────────────────────────────
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: 'qtcharts'
          cache: true

      # ── .NET 8 SDK & LHM Helper ──────────────────────────────────────────
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build LHM Sensor Reader
        run: |
          dotnet publish tools/lhm-sensor-reader/lhm-sensor-reader.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:PublishTrimmed=true -p:TrimMode=partial `
            -o build/Release/tools

      # ── Configure CMake with MSVC ────────────────────────────────────────
      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ── Package as portable ZIP ──────────────────────────────────────────
      - name: Package Portable
        shell: pwsh
        run: scripts/package-portable.ps1 -BuildDir build -BuildType ${{ env.BUILD_TYPE }}

      # ── Upload build artifact ────────────────────────────────────────────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCCT-StressTest-win64-portable
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 90

      # ── Generate latest.json for auto-updater ─────────────────────────────
      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $zipFile = Get-ChildItem dist/*.zip | Select-Object -First 1
          $sha256 = (Get-Content dist/*.sha256 -Raw).Trim().Split(' ')[0]
          $downloadUrl = "https://github.com/kimjione1206/occt-native-2.0/releases/download/${{ github.ref_name }}/$($zipFile.Name)"
          @{
            version = $version
            download_url = $downloadUrl
            sha256 = $sha256
            release_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          } | ConvertTo-Json | Set-Content dist/latest.json

      # ── Create GitHub Release on tag push ────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} (Internal Build - Not for public use)"
          files: |
            dist/*.zip
            dist/*.sha256
            dist/latest.json
          body: |
            ⚠️ **Internal Development Build** - This is NOT an official OCCT release.
            This project is not affiliated with OCCT. For personal/internal testing only.

            ---
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
